{% load static %}
<!doctype html>
<html lang="fa">
<head>
    <meta charset="utf-8">
    <title>فرم پذیرش</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'css/accept.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/toastify/toastify.css' %}">
</head>
<body style="direction: rtl;">

<form method="post" class="accept-form">
    {% csrf_token %}
    <h1 class="form-title">فرم پذیرش</h1>

    <!-- مشخصات دستگاه -->
    <h2 class="section-title">مشخصات دستگاه</h2>
    <div class="form-grid">
        <label class="form-label">
            نام دستگاه
            {{ form.device_name }}
        </label>

        <label class="form-label">
            نوع دستگاه
            {{ form.device_type }}
        </label>

        <label class="form-label">
            مدل دستگاه
            {{ form.device_model }}
        </label>

        <label class="form-label">
            سریال دستگاه
            {{ form.device_serial }}
        </label>
    </div>

    <!-- مشخصات مالک -->
    <h2 class="section-title">مشخصات مالک</h2>
    <div class="form-grid">
        <label class="form-label">
            نام مالک
            {{ form.owner_name }}
        </label>

        <label class="form-label">
            شماره مالک
            {{ form.owner_phone }}
        </label>

        <label class="form-label">
            کد ملی
            {{ form.owner_national_id }}
            <div class="national-id-group">
                <button type="button" class="form-btn form-btn-outline" id="inquiry-btn">استعلام</button>
            </div>
        </label>

        <label class="form-label">
            تلفن ثابت
            {{ form.owner_landline }}
        </label>

        <label class="form-label" style="grid-column: 1 / -1;">
            آدرس
            {{ form.owner_address }}
        </label>
    </div>

    <!-- مشخصات مشکل -->
    <h2 class="section-title">مشخصات مشکل</h2>
    <div class="form-grid">
        <label class="form-label" style="grid-column: 1 / -1;">
            ایرادهای ظاهری
            {{ form.appearance_issue }}
        </label>

        <label class="form-label" style="grid-column: 1 / -1;">
            توضیحات
            {{ form.description }}
        </label>

        <label class="form-label" style="grid-column: 1 / -1;">
            نظر تکنسین
            {{ form.technician_note }}
        </label>

        <label class="form-label">
            هزینه
            {{ form.cost }}
        </label>

        <div class="form-radio-group" style="grid-column: 1 / -1;">
            آیا گارانتی دارد؟
            {{ form.has_warranty }}
        </div>

        <label class="form-label">
            مدت گارانتی (ماه)
            {{ form.warranty_period }}
        </label>

        <input type="hidden" name="created_by" value="{{ request.user.id }}">
    </div>

    <!-- نوع پذیرش و تحویل -->
    <h2 class="section-title">نوع پذیرش و تحویل</h2>
    <div class="form-grid">
        <div class="form-radio-group">
            نوع پذیرش:
            {{ form.reception_type }}
        </div>

        <div class="form-radio-group">
            نوع تحویل:
            {{ form.delivery_type }}
        </div>
    </div>

    <!-- دکمه‌ها -->
    <button type="submit" class="form-btn form-btn-primary" id="save-btn">ذخیره</button>
    <a href="{% url 'website:home' %}" class="form-btn form-btn-outline" style="text-align: center;" id="back-btn">بازگشت</a>

</form>

<script src="{% static 'vendor/toastify/toastify.js' %}"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const inquiryBtn = document.getElementById('inquiry-btn');
    const nationalIdInput = document.getElementById('id_owner_national_id');

    inquiryBtn.addEventListener('click', function () {
        const nationalId = nationalIdInput.value.trim();

        if (!nationalId) {
            Toastify({ text: "لطفاً کد ملی را وارد کنید.", backgroundColor: "#e74c3c" }).showToast();
            return;
        }

        inquiryBtn.disabled = true;
        inquiryBtn.textContent = 'در حال بررسی...';

        fetch(`{% url 'paziresh:paziresh-inquiry' %}?national_id=${encodeURIComponent(nationalId)}`, {
            method: 'GET',
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(res => res.json())
        .then(res => {
            if (res.found) {
                document.getElementById('id_owner_name').value = res.data.owner_name;
                document.getElementById('id_owner_phone').value = res.data.owner_phone;
                document.getElementById('id_owner_landline').value = res.data.owner_landline;
                document.getElementById('id_owner_address').value = res.data.owner_address;

                Toastify({ text: "اطلاعات مالک با موفقیت بارگذاری شد.", backgroundColor: "#2ecc71" }).showToast();
            } else {
                Toastify({ text: res.message, backgroundColor: "#e67e22" }).showToast();
            }
        })
        .catch(() => {
            Toastify({ text: "خطا در ارتباط با سرور.", backgroundColor: "#e74c3c" }).showToast();
        })
        .finally(() => {
            inquiryBtn.disabled = false;
            inquiryBtn.textContent = 'استعلام';
        });
    });
});
</script>
{% include 'messages.html' %}
</body>
</html>
